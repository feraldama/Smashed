name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smash
          POSTGRES_PASSWORD: smash
          POSTGRES_DB: smash_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smash"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Versión la toma de packageManager en package.json (pnpm@9.12.0).

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Prisma 7 trae deps que exigen Node >= 22 (@prisma/streams-local).
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma 7 ya no auto-genera el cliente en postinstall (como sí hacía
      # Prisma 5). Sin esto, lint/typecheck fallan porque @prisma/client no
      # tiene tipos generados.
      - name: Generate Prisma client
        run: pnpm --filter @smash/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Apply migrations + seed test DB
        env:
          DATABASE_URL: postgresql://smash:smash@localhost:5432/smash_test?schema=public
        run: |
          pnpm --filter @smash/api exec prisma migrate deploy
          pnpm --filter @smash/api exec tsx prisma/seed.ts

      - name: Test
        env:
          DATABASE_URL: postgresql://smash:smash@localhost:5432/smash_test?schema=public
          REDIS_URL: redis://localhost:6379
        run: pnpm test
