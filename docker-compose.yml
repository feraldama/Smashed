name: smash

services:
  # Postgres es OPCIONAL — sólo se levanta si no tenés Postgres nativo en tu máquina.
  # Profile: db. Levantar con `pnpm services:up:db` o `docker compose --profile db up -d`.
  postgres:
    image: postgres:16-alpine
    container_name: smash-postgres
    restart: unless-stopped
    profiles: ['db']
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
      POSTGRES_DB: ${DB_NAME:-smash}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: America/Asuncion
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-smash}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smash-net

  # Redis siempre activo (BullMQ + cache).
  redis:
    image: redis:7-alpine
    container_name: smash-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smash-net

  # pgAdmin OPCIONAL — profile `tools`. Levantar con `pnpm services:up:tools`.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smash-pgadmin
    restart: unless-stopped
    profiles: ['tools']
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@smash.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - smash-net

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  pgadmin-data:
    driver: local

networks:
  smash-net:
    driver: bridge
